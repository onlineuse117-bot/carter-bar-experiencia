<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carter Bar · ¿Qué cóctel eres?</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style> body { background: #0E1B1A; margin: 0; } </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useState, useEffect } = React;

const C = { ink:"#0E1B1A", card:"#162A28", line:"#2C4642", sage:"#7FA098", gold:"#C9A24B", bone:"#E9E3D5" };
const display = { fontFamily: "Georgia, 'Times New Roman', serif" };
const mono = { fontFamily: "'Courier New', Courier, monospace" };

const DRINKS = {
  terroir: { n:"Terroir", d:"Shrub de apio, Giffard de ruibarbo y prosecco", ml:200, p:205, tag:"Signature", abv:"Suave", why:"El más 'jardín' de la carta: el shrub de apio da acidez vegetal, el ruibarbo un amargor limpio y el prosecco lo levanta. Complejo sin ser pesado, y el que menos alcohol tiene de los de autor." },
  elsalas: { n:"El Salas", d:"Cordial de piña, Roku gin, vermouth Mancino y foam de matcha", ml:135, p:235, tag:"Signature", abv:"Medio", why:"Piña y matcha suenan raro y funcionan: el cordial entra dulce-tropical y el matcha lo corta con amargor herbal. El Roku gin, japonés y con sakura y yuzu, une las dos mitades, y la espuma lo vuelve sedoso." },
  cardon: { n:"Cardón", d:"Aguacate clarificado con bacanora aguamiel, cordial de albahaca y Cocchi Americano", ml:150, p:250, tag:"Signature", abv:"Medio", why:"Clarificar el aguacate le quita el peso y le deja la untuosidad: queda transparente pero se siente cremoso. La albahaca y el amargo suave del Cocchi lo mantienen fresco, y la bacanora es agave sin humo." },
  ramotuna: { n:"Ramo de Tuna", d:"Jarabe clarificado de tuna con jitomate cherry y Pox Siglo Cero", ml:150, p:350, tag:"Signature", abv:"Medio", why:"El más audaz de la casa. Tuna y jitomate arman un perfil dulce-salado que casi no existe en coctelería, y el pox, destilado de maíz chiapaneco, aporta un ahumado suave distinto al del mezcal." },
  aperol: { n:"Aperol Spritz", d:"Vino espumoso y Aperol", ml:180, p:270, tag:"Clásico", abv:"Suave", why:"Amargo cítrico, burbuja y poca graduación. Está literalmente diseñado como aperitivo: abre el apetito y se deja tomar durante toda una conversación." },
  stgermain: { n:"St. Germain Spritz", d:"St. Germain, prosecco y agua mineral", ml:180, p:505, tag:"Clásico", abv:"Suave", why:"Flor de saúco: floral, seco y delicado. Es el spritz más elegante y el más caro de la carta; se paga el licor." },
  mojito: { n:"Mojito", d:"Hierbabuena, azúcar, limón y ron", ml:473, p:180, tag:"Clásico", abv:"Suave", why:"473 ml de menta, limón y hielo. Poca graduación repartida en mucho vaso: refresca sin exigirte nada." },
  mojitofr: { n:"Mojito Frutos Rojos", d:"Hierbabuena, azúcar, limón, frutos rojos y ron", ml:473, p:210, tag:"Clásico", abv:"Suave", why:"El mojito con fruta: más goloso, mismo tamaño generoso y misma ligereza. La acidez de los frutos rojos evita que se vuelva empalagoso." },
  paloma: { n:"Paloma", d:"Toronja, Cascahuín reposado, limón, jarabe de agave y agua mineral", ml:180, p:210, tag:"Clásico", abv:"Suave", why:"Toronja amarga, burbuja mineral y un tequila reposado que se asoma tantito. Sin pretensiones y difícil de mejorar." },
  ginfizz: { n:"Gin Fizz", d:"Beefeater London Dry, limón, jarabe natural, aquafaba y agua mineral", ml:175, p:210, tag:"Clásico", abv:"Suave", why:"Cítrico con textura de nube: la aquafaba monta una espuma densa y el agua mineral lo alarga. Ácido, aireado y suave de alcohol." },
  mule: { n:"Moscow Mule", d:"Zubrówka, limón y ginger beer", ml:190, p:205, tag:"Clásico", abv:"Suave", why:"El jengibre pica, el limón corta y el vodka casi desaparece. Refrescante pero con filo." },
  pinacolada: { n:"Piña Colada", d:"Crema de coco, jugo de piña natural tatemado y ron", ml:444, p:190, tag:"Clásico", abv:"Suave", why:"Cremosa, tropical y enorme. La piña tatemada le mete un fondo tostado y caramelizado que la versión de playa no tiene." },
  margarita: { n:"Margarita", d:"Tequila Centenario Plata, shakeada — frutos rojos, limón, maracuyá o mango", ml:180, p:210, tag:"Clásico", abv:"Medio", why:"Ácida, fría y con fruta a elegir. Un clásico que nunca falla, y aquí lo shakean, así que llega aireado y bien frío." },
  pisco: { n:"Pisco Sour", d:"Pisco Quebranta, jarabe natural, limón, aquafaba y angostura", ml:170, p:205, tag:"Clásico", abv:"Medio", why:"Sedoso y ácido, con las gotas de angostura encima aromatizando cada trago. El equilibrio dulce-ácido-textura más fino de la carta." },
  cosmo: { n:"Cosmopolitan", d:"Absolut Citron, arándano, limón y Cointreau", ml:120, p:220, tag:"Clásico", abv:"Medio", why:"Frutal y ácido, servido helado en copa. Bonito de ver y más seco de lo que su fama sugiere." },
  mezcalita: { n:"Mezcalita", d:"Mezcal Unión joven — jamaica, frutos rojos, limón, maracuyá o mango", ml:180, p:250, tag:"Clásico", abv:"Medio", why:"Margarita con mezcal: la fruta entra dulce y el humo contesta al final. El punto medio perfecto entre refrescante e intenso." },
  naked: { n:"Naked and Famous", d:"Mezcal Unión joven, Aperol, Yellow Chartreuse y limón", ml:120, p:350, tag:"Clásico", abv:"Fuerte", why:"Cuatro partes iguales: humo, amargo, herbal y ácido. Sin azúcar añadida y sin lugar donde esconderse. Es el trago de quien ya sabe lo que quiere." },
  negroni: { n:"Negroni", d:"Campari, Beefeater London Dry y Cocchi di Torino", ml:90, p:215, tag:"Clásico", abv:"Fuerte", why:"Amargo, seco y sin concesiones. 90 ml para tomar lento: es un trago de conversación larga, no de sed." },
  oldfashioned: { n:"Old Fashioned", d:"Wild Turkey 101, Luxardo Maraschino, angostura y orange angostura", ml:75, p:275, tag:"Clásico", abv:"Fuerte", why:"Destilado, azúcar, amargos y hielo: la definición original de la palabra 'cóctel'. Con Wild Turkey 101 llega potente y especiado." },
  boulevardier: { n:"Boulevardier", d:"Campari, Mitcher's bourbon y Antica Formula", ml:90, p:290, tag:"Clásico", abv:"Fuerte", why:"El Negroni con bourbon en lugar de gin: más cálido, más redondo, igual de amargo. El Antica Formula le suma vainilla." },
  hanky: { n:"Hanky Panky", d:"Beefeater London Dry, Antica Formula y Fernet", ml:100, p:312, tag:"Clásico", abv:"Fuerte", why:"El Fernet le mete un amargo mentolado que no se parece a nada más en esta carta. Raro, adictivo y muy poco pedido." },
  martini: { n:"Martini Dry", d:"Bombay, vermouth Dolin Dry, aceituna verde", ml:75, p:220, tag:"Martini", abv:"Fuerte", why:"Ginebra helada, un susurro de vermouth y una aceituna. No hay dónde esconderse: o te gusta el destilado, o no." },
  espresso: { n:"Espresso Martini", d:"Espresso, Ketel One, Kahlúa y jarabe natural", ml:120, p:205, tag:"Clásico", abv:"Medio", why:"Café frío con espuma y vodka. Sabe a postre y te despierta: el único trago de la carta que hace las dos cosas." },
  carajillo: { n:"Carajillo", d:"Licor 43, espresso y Zacapa 23", ml:120, p:275, tag:"Clásico", abv:"Medio", why:"Vainilla, cítrico dulce y café, con un ron guatemalteco añejo de fondo. El cierre clásico de cualquier mesa mexicana." },
  bloody: { n:"Bloody Mary", d:"Vodka, salsas, jugo de tomate y limón", ml:473, p:185, tag:"Clásico", abv:"Suave", why:"Salado, picante y enorme. Prácticamente una botana líquida: el vodka queda de reparto." },
};

const BASE = { terroir:3, aperol:3, mojito:3, mojitofr:3, paloma:3, stgermain:2, ginfizz:2, mule:2, pinacolada:2, elsalas:2, cardon:1, ramotuna:1, pisco:1, bloody:1 };

const Q = [
  { q:"Llegas al bar y te sientas. ¿Qué te pide el cuerpo?", axis:"intención", a:[
    { t:"Algo frío que se tome sin pensarlo", read:"buscas refresco puro, no un acertijo", w:{ mojito:3, paloma:3, margarita:2, mule:2, aperol:2, bloody:1 } },
    { t:"Burbujas, para brindar como se debe", read:"quieres que el trago se sienta como una celebración", w:{ aperol:3, stgermain:3, terroir:3, ginfizz:2 } },
    { t:"Un trago serio, para tomar despacio", read:"prefieres poco volumen y mucha concentración", w:{ negroni:3, oldfashioned:3, boulevardier:3, martini:2, hanky:2 } },
    { t:"Algo que jamás haya probado", read:"vienes por la curiosidad, no por la costumbre", w:{ ramotuna:3, cardon:3, elsalas:3, terroir:2, naked:2 } },
  ]},
  { q:"El sabor que te hace voltear:", axis:"paladar", a:[
    { t:"Cítrico y ácido", read:"tu eje es la acidez", w:{ margarita:3, paloma:3, ginfizz:3, pisco:3, cosmo:2, mule:1 } },
    { t:"Amargo y herbal", read:"toleras (y disfrutas) el amargor, cosa de pocos", w:{ negroni:3, aperol:3, naked:3, boulevardier:2, hanky:2, terroir:2 } },
    { t:"Dulce y frutal", read:"quieres fruta al frente", w:{ mojitofr:3, cosmo:3, pinacolada:3, stgermain:2, margarita:1 } },
    { t:"Vegetal y salino, tipo huerto", read:"te va lo salado-vegetal, el territorio más raro de la coctelería", w:{ cardon:3, terroir:3, bloody:3, ramotuna:2, martini:1 } },
    { t:"Tostado: café, cacao, caramelo", read:"buscas notas tostadas y dulces", w:{ espresso:3, carajillo:3, oldfashioned:2, boulevardier:2 } },
  ]},
  { q:"¿Qué tanto quieres sentir el alcohol?", axis:"intensidad", a:[
    { t:"Casi nada, quiero platicar toda la noche", read:"pediste baja graduación", w:{ aperol:3, stgermain:3, terroir:3, mojito:3, paloma:2, mule:2, pinacolada:2, bloody:2 } },
    { t:"Equilibrado: que se note pero no mande", read:"quieres el destilado presente pero domado", w:{ margarita:2, ginfizz:2, pisco:2, elsalas:2, cosmo:2, mojitofr:2, cardon:2, ramotuna:2, espresso:1 } },
    { t:"Con carácter, que se pare de frente", read:"no le huyes al alcohol", w:{ negroni:3, oldfashioned:3, boulevardier:3, hanky:2, naked:2, mezcalita:2 } },
    { t:"Directo, casi puro destilado", read:"quieres el destilado desnudo", w:{ martini:4, oldfashioned:2, negroni:1, hanky:1 } },
  ]},
  { q:"La textura que te gusta en la boca:", axis:"textura", a:[
    { t:"Burbujeante y ligera", read:"la burbuja es innegociable", w:{ aperol:3, stgermain:3, terroir:3, mule:2, ginfizz:2, paloma:2 } },
    { t:"Sedosa, con espuma encima", read:"te importa el cuerpo tanto como el sabor", w:{ ginfizz:3, pisco:3, elsalas:3, espresso:2 } },
    { t:"Limpia y helada, sin adornos", read:"quieres el trago sin distracciones", w:{ martini:3, margarita:2, negroni:2, cosmo:2, paloma:1 } },
    { t:"Cremosa y densa", read:"vas por textura rica", w:{ pinacolada:3, carajillo:2, espresso:2, cardon:2 } },
  ]},
  { q:"Ahumado y mezcal:", axis:"humo", a:[
    { t:"Me encanta, entre más humo mejor", read:"el humo te llama", w:{ mezcalita:4, naked:4, ramotuna:2 } },
    { t:"Un toque, sin que domine", read:"aceptas humo, pero de fondo", w:{ cardon:2, ramotuna:2, naked:2, mezcalita:1 } },
    { t:"Mejor no", read:"descartaste el humo", w:{ aperol:1, mojito:1, ginfizz:1, paloma:1, stgermain:1, terroir:1, cosmo:1, margarita:1, pinacolada:1 } },
  ]},
  { q:"Si tu trago fuera un lugar, sería:", axis:"ánimo", a:[
    { t:"Una terraza en Italia al atardecer", read:"vas por el aperitivo europeo", w:{ aperol:3, stgermain:3, negroni:2 } },
    { t:"Un jardín botánico después de la lluvia", read:"te atrae lo verde, herbal y limpio", w:{ terroir:3, cardon:3, elsalas:2, ginfizz:1 } },
    { t:"Una hamaca frente al mar", read:"quieres algo tropical y sin prisa", w:{ pinacolada:3, mojito:3, mojitofr:2, margarita:1 } },
    { t:"Una biblioteca con sillón de piel", read:"buscas un trago de contemplación", w:{ oldfashioned:3, boulevardier:3, hanky:3, martini:2, carajillo:1 } },
    { t:"Un mercado mexicano a mediodía", read:"quieres agave, cítrico y sabor de casa", w:{ paloma:3, mezcalita:3, ramotuna:2, bloody:2 } },
  ]},
  { q:"El detalle que te conquista de un trago:", axis:"detalle", a:[
    { t:"Una espuma perfecta", read:"te seduce la técnica visible", w:{ elsalas:3, ginfizz:3, pisco:3, espresso:1 } },
    { t:"Un ingrediente raro que tienes que preguntar qué es", read:"quieres algo de qué hablar", w:{ ramotuna:3, cardon:3, terroir:2, naked:2 } },
    { t:"Un clásico impecable, sin reinventar", read:"confías en la receta probada", w:{ negroni:3, martini:3, oldfashioned:3, mojito:2, margarita:2 } },
    { t:"Que sea grande y me dure toda la noche", read:"el volumen importa: quieres vaso largo", w:{ mojito:3, mojitofr:3, pinacolada:3, bloody:2, mule:1 } },
  ]},
];

function analyze(ans) {
  const s = { ...BASE };
  const contrib = {};
  ans.forEach((ai, qi) => {
    const opt = Q[qi].a[ai];
    for (const k in opt.w) {
      s[k] = (s[k] || 0) + opt.w[k];
      contrib[k] = contrib[k] || [];
      contrib[k].push({ pts: opt.w[k], read: opt.read, axis: Q[qi].axis, label: opt.t });
    }
  });
  const rank = Object.entries(s).sort((a,b) => b[1]-a[1]);
  const winner = rank[0][0];
  const reasons = (contrib[winner] || []).sort((a,b) => b.pts-a.pts).slice(0,4);
  return { winner, runnerUp: rank[1][0], third: rank[2][0], reasons };
}

function App() {
  const [stage, setStage] = useState("intro");
  const [name, setName] = useState("");
  const [ans, setAns] = useState([]);
  const [qi, setQi] = useState(0);
  const [fade, setFade] = useState(true);

  useEffect(() => { setFade(false); const t = setTimeout(() => setFade(true), 20); return () => clearTimeout(t); }, [qi, stage]);

  const pick = (i) => {
    const next = [...ans]; next[qi] = i; setAns(next);
    if (qi < Q.length - 1) setQi(qi + 1); else setStage("done");
  };
  const back = () => { if (qi > 0) setQi(qi - 1); };
  const reset = () => { setStage("intro"); setAns([]); setQi(0); setName(""); };

  const res = stage === "done" ? analyze(ans) : null;
  const d = res ? DRINKS[res.winner] : null;

  return (
    <div className="min-h-screen w-full px-5 py-8" style={{ background: C.ink, color: C.bone }}>
      <div className="mx-auto max-w-lg">
        <div className="text-center mb-8">
          <div className="text-[10px] tracking-[0.4em] mb-2" style={{ color: C.sage, ...mono }}>HACIENDA LA LABORCILLA</div>
          <h1 className="text-4xl leading-tight" style={{ ...display, color: C.gold }}>Carter Bar</h1>
          <div className="mx-auto mt-3 h-px w-16" style={{ background: C.line }}></div>
        </div>

        <div style={{ opacity: fade ? 1 : 0, transition: "opacity 300ms ease" }}>
          {stage === "intro" && (
            <div className="text-center">
              <p className="text-2xl mb-3" style={display}>¿Qué cóctel eres?</p>
              <p className="text-sm mb-8 leading-relaxed" style={{ color: C.sage }}>
                Siete preguntas sobre cómo te gusta beber. Al final, un trago de nuestra carta
                y la explicación de por qué te tocó ese y no otro. Contesta rápido, sin pensarlo mucho.
              </p>
              <input value={name} onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && setStage("quiz")}
                placeholder="Tu nombre (opcional)"
                className="w-full mb-4 px-4 py-3 rounded-sm text-center outline-none text-sm"
                style={{ background: C.card, border: "1px solid " + C.line, color: C.bone }} />
              <button onClick={() => setStage("quiz")} className="px-8 py-3 rounded-sm text-sm tracking-widest"
                style={{ background: C.gold, color: C.ink, ...mono }}>EMPEZAR</button>
            </div>
          )}

          {stage === "quiz" && (
            <div>
              <div className="flex gap-1 mb-6">
                {Q.map((_, i) => (
                  <div key={i} className="h-[2px] flex-1" style={{ background: i <= qi ? C.gold : C.line }}></div>
                ))}
              </div>
              <p className="text-[10px] tracking-[0.3em] mb-3" style={{ color: C.sage, ...mono }}>
                PREGUNTA {qi + 1} DE {Q.length}
              </p>
              <h2 className="text-2xl mb-6 leading-snug" style={display}>{Q[qi].q}</h2>
              <div className="space-y-2">
                {Q[qi].a.map((o, i) => (
                  <button key={i} onClick={() => pick(i)}
                    className="w-full text-left px-4 py-4 rounded-sm text-sm"
                    style={{ background: C.card, border: "1px solid " + (ans[qi] === i ? C.gold : C.line), color: C.bone }}>
                    {o.t}
                  </button>
                ))}
              </div>
              {qi > 0 && (
                <button onClick={back} className="mt-6 text-xs tracking-widest" style={{ color: C.sage, ...mono }}>
                  ← ANTERIOR
                </button>
              )}
            </div>
          )}

          {stage === "done" && d && (
            <div className="space-y-5">
              <p className="text-center text-[10px] tracking-[0.3em]" style={{ color: C.sage, ...mono }}>
                {name ? name.toUpperCase() + " · " : ""}TU CÓCTEL ES
              </p>

              <div className="rounded-lg border p-6 text-center" style={{ borderColor: C.gold, background: C.card }}>
                <div className="text-[10px] tracking-[0.3em] mb-3" style={{ color: C.sage, ...mono }}>{d.tag.toUpperCase()}</div>
                <h2 className="text-4xl mb-2" style={{ ...display, color: C.gold }}>{d.n}</h2>
                <p className="text-sm mb-4" style={{ color: C.bone }}>{d.d}</p>
                <div className="flex justify-center gap-5 text-[11px]" style={{ color: C.sage, ...mono }}>
                  <span>{d.ml} ml</span><span>${d.p}</span><span>ALCOHOL: {d.abv.toUpperCase()}</span>
                </div>
              </div>

              <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
                <h3 className="text-lg mb-2" style={{ ...display, color: C.gold }}>Por qué este trago</h3>
                <p className="text-sm leading-relaxed" style={{ color: C.bone }}>{d.why}</p>
              </div>

              <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
                <h3 className="text-lg mb-3" style={{ ...display, color: C.gold }}>Por qué te tocó a ti</h3>
                <ul className="space-y-3">
                  {res.reasons.map((r, i) => (
                    <li key={i} className="flex gap-3">
                      <span className="text-[10px] pt-1" style={{ color: C.gold, ...mono }}>{r.axis.toUpperCase()}</span>
                      <span className="flex-1 text-sm leading-snug" style={{ color: C.bone }}>
                        Dijiste <span style={{ color: C.sage }}>“{r.label.toLowerCase()}”</span> — {r.read}, y el {d.n} vive justo ahí.
                      </span>
                    </li>
                  ))}
                </ul>
              </div>

              <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
                <h3 className="text-sm mb-3 tracking-widest" style={{ color: C.sage, ...mono }}>SI ESE NO TE LATE</h3>
                {[res.runnerUp, res.third].map((id) => (
                  <div key={id} className="mb-3 last:mb-0">
                    <div className="text-base" style={{ ...display, color: C.gold }}>{DRINKS[id].n} · ${DRINKS[id].p}</div>
                    <div className="text-xs" style={{ color: C.sage }}>{DRINKS[id].d}</div>
                  </div>
                ))}
              </div>

              <div className="text-center pt-1">
                <button onClick={reset} className="px-6 py-2 rounded-sm text-xs tracking-widest"
                  style={{ border: "1px solid " + C.line, color: C.sage, ...mono }}>REPETIR</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
