function analyze(ans) {
  const s = { ...BASE };
  const contrib = {};
  ans.forEach((ai, qi) => {
    const opt = Q[qi].a[ai];
    for (const k in opt.w) {
      s[k] = (s[k] || 0) + opt.w[k];
      contrib[k] = contrib[k] || [];
      contrib[k].push({ pts: opt.w[k], read: opt.read, axis: Q[qi].axis, label: opt.t });
    }
  });
  const rank = Object.entries(s).sort((a, b) => b[1] - a[1]);
  const winner = rank[0][0];
  const reasons = (contrib[winner] || []).sort((a, b) => b.pts - a.pts).slice(0, 4);
  return { winner, runnerUp: rank[1][0], third: rank[2][0], reasons, total: rank[0][1] };
}

/* Limpia la URL por si se pegó con /rest/v1 o diagonal final */
const BASE_URL = SUPABASE_URL.trim().replace(/\/+$/, "").replace(/\/rest\/v1$/, "");
const activo = () => BASE_URL.startsWith("https://");

/* Guarda una fila en la tabla `respuestas`. Nunca bloquea la experiencia:
   si falla, el quiz sigue funcionando igual. */
async function guardar(payload) {
  if (!activo()) { console.log("[demo] sin base de datos:", payload); return { ok:false, demo:true }; }
  try {
    const nueva = SUPABASE_KEY.startsWith("sb_");   // formato nuevo de Supabase
    const headers = {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal",
    };
    if (!nueva) headers["Authorization"] = "Bearer " + SUPABASE_KEY;
    const r = await fetch(BASE_URL + "/rest/v1/respuestas", {
      method: "POST",
      headers,
      body: JSON.stringify(payload),
    });
    let detalle = "";
    if (!r.ok) { try { detalle = await r.text(); } catch(e){} console.error("Supabase", r.status, detalle); }
    return { ok: r.ok, status: r.status, detalle };
  } catch (e) { console.error(e); return { ok:false, status:0, detalle:String(e) }; }
}

/* ── Captura opcional de correo, con consentimiento explícito ── */
function CapturaDatos({ onEnviar }) {
  const [correo, setCorreo] = useState("");
  const [acepta, setAcepta] = useState(false);
  const [promos, setPromos] = useState(false);
  const [estado, setEstado] = useState("");   // "", "enviando", "listo", "error"
  const [diag, setDiag] = useState(null);
  const [aviso, setAviso] = useState(false);

  const valido = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(correo) && acepta;

  const enviar = async () => {
    if (!valido) return;
    setEstado("enviando");
    const r = await onEnviar({ correo, promos });
    if (r && r.ok) { setEstado("listo"); }
    else { setDiag(r); setEstado("error"); }
  };

  if (estado === "listo") return (
    <div className="rounded-lg border p-5 text-center" style={{ borderColor: C.line, background: C.card }}>
      <p className="text-sm" style={{ color: C.bone }}>Listo, te enviamos tu resultado.</p>
      <p className="text-xs mt-2" style={{ color: C.sage }}>Puedes darte de baja cuando quieras.</p>
    </div>
  );

  return (
    <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
      {aviso && <AvisoPrivacidad cerrar={() => setAviso(false)} />}
      <h3 className="text-lg mb-1" style={{ ...display, color: C.gold }}>¿Te lo enviamos?</h3>
      <p className="text-xs mb-4" style={{ color: C.sage }}>
        Opcional. Puedes seguir sin dejar tus datos.
      </p>

      <input type="email" value={correo} onChange={e => setCorreo(e.target.value)}
        placeholder="tu@correo.com" autoComplete="email"
        className="w-full mb-3 px-4 py-3 rounded-sm outline-none text-sm"
        style={{ background: C.ink, border: "1px solid " + C.line, color: C.bone }} />

      <label className="flex gap-3 mb-3 cursor-pointer">
        <input type="checkbox" checked={acepta} onChange={e => setAcepta(e.target.checked)}
          style={{ marginTop: 3, accentColor: C.gold }} />
        <span className="text-xs leading-snug" style={{ color: C.bone }}>
          Acepto el tratamiento de mis datos conforme al{" "}
          <button onClick={(e) => { e.preventDefault(); setAviso(true); }}
            style={{ color: C.gold, textDecoration: "underline" }}>aviso de privacidad</button>.
        </span>
      </label>

      <label className="flex gap-3 mb-4 cursor-pointer">
        <input type="checkbox" checked={promos} onChange={e => setPromos(e.target.checked)}
          style={{ marginTop: 3, accentColor: C.gold }} />
        <span className="text-xs leading-snug" style={{ color: C.sage }}>
          Quiero recibir promociones y novedades (opcional).
        </span>
      </label>

      <button onClick={enviar} disabled={!valido || estado === "enviando"}
        className="w-full py-3 rounded-sm text-xs tracking-widest"
        style={{ background: valido ? C.gold : "transparent", color: valido ? C.ink : C.sage,
                 border: "1px solid " + (valido ? C.gold : C.line), ...mono,
                 cursor: valido ? "pointer" : "not-allowed" }}>
        {estado === "enviando" ? "ENVIANDO…" : "ENVIAR"}
      </button>
      {estado === "error" && (
        <div className="mt-3">
          <p className="text-xs text-center" style={{ color: C.sage }}>
            No pudimos guardarlo. Puedes pedirle la recomendación a tu mesero.
          </p>
          {diag && (
            <div className="mt-3 p-3 rounded-sm text-[10px] leading-snug"
              style={{ background: C.ink, border: "1px dashed " + C.line, color: C.sage, ...mono }}>
              <div style={{ color: C.gold }}>DIAGNÓSTICO (quitar en producción)</div>
              <div>código: {String(diag.status)}</div>
              <div style={{ wordBreak: "break-all" }}>{String(diag.detalle || "").slice(0, 220)}</div>
              <div className="mt-2" style={{ color: C.bone }}>
                {diag.status === 404 && "→ La tabla no existe. Corre el SQL en Supabase."}
                {diag.status === 401 && "→ Llave incorrecta o falta la política de inserción (RLS)."}
                {diag.status === 403 && "→ Falta la política de inserción para el rol anon."}
                {diag.status === 400 && "→ Alguna columna no coincide con la tabla."}
                {diag.status === 0 && "→ No hubo respuesta: revisa que la URL sea correcta."}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Comanda para el personal ── */
function Comanda({ ans, name, drink }) {
  const P = { bg:"#F2EEE2", ink:"#2A3A37", soft:"#5A6B66", faint:"#9A968A", edge:"#B9B3A3" };
  const lineas = ans.map((ai, i) => ({ label: Q[i].axis, value: Q[i].a[ai].t }));
  return (
    <div className="mx-auto w-full max-w-xs px-5 py-4" style={{ background: P.bg, ...mono }}>
      <div className="text-center text-[10px] tracking-[0.25em] pb-2 mb-3"
        style={{ color: P.soft, borderBottom: "1px dashed " + P.edge }}>CARTER BAR · COMANDA</div>
      <div className="text-[11px] mb-3" style={{ color: P.ink }}>INVITADO: {name ? name.toUpperCase() : "—"}</div>
      {lineas.map((l, i) => (
        <div key={i} className="text-[11px] leading-relaxed flex justify-between gap-3">
          <span style={{ color: P.faint }}>{l.label}</span>
          <span className="text-right" style={{ color: P.ink }}>{l.value.slice(0, 22)}</span>
        </div>
      ))}
      {drink && (
        <div className="mt-3 pt-3" style={{ borderTop: "1px dashed " + P.edge }}>
          <div className="flex justify-between text-[12px] font-bold" style={{ color: P.ink }}>
            <span>{drink.n.toUpperCase()}</span><span>${drink.p}</span>
          </div>
          <div className="text-[10px] mt-1" style={{ color: P.faint }}>{drink.ml} ML · {drink.tag.toUpperCase()}</div>
          <div className="text-center text-[9px] tracking-[0.25em] mt-4 pt-3"
            style={{ color: P.faint, borderTop: "1px dashed " + P.edge }}>GRACIAS POR SU VISITA</div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [edadOk, setEdadOk] = useState(false);
  const [stage, setStage] = useState("intro");
  const [sesion] = useState(() => "s_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8));
  const [name, setName] = useState("");
  const [ans, setAns] = useState([]);
  const [qi, setQi] = useState(0);
  const [fade, setFade] = useState(true);

  useEffect(() => { setFade(false); const t = setTimeout(() => setFade(true), 20); return () => clearTimeout(t); }, [qi, stage]);

  const pick = (i) => {
    const next = [...ans]; next[qi] = i; setAns(next);
    if (qi < Q.length - 1) setQi(qi + 1); else setStage("done");
  };
  const back = () => { if (qi > 0) setQi(qi - 1); };
  const reset = () => { setStage("intro"); setAns([]); setQi(0); setName(""); };

  // Guarda el resultado (sin datos personales) en cuanto termina el quiz
  useEffect(() => {
    if (stage !== "done" || ans.length !== Q.length) return;
    const r = analyze(ans);
    guardar({
      sesion, restaurante: RESTAURANTE,
      respuestas: ans.map((ai, i) => ({ pregunta: Q[i].axis, opcion: Q[i].a[ai].t })),
      resultado: DRINKS[r.winner].n,
      precio: DRINKS[r.winner].p,
      alternativas: [DRINKS[r.runnerUp].n, DRINKS[r.third].n],
      edad_confirmada: true,
      creado: new Date().toISOString(),
    });
  }, [stage]);

  // Actualiza la fila con el correo, sólo si la persona lo autoriza
  const enviarCorreo = async ({ correo, promos }) => {
    const r = analyze(ans);
    const res = await guardar({
      sesion, restaurante: RESTAURANTE, correo, marketing: promos,
      consentimiento: true, consentimiento_fecha: new Date().toISOString(),
      resultado: DRINKS[r.winner].n, edad_confirmada: true,
      creado: new Date().toISOString(),
    });
    return res.demo ? { ok:true } : res;
  };

  const res = stage === "done" ? analyze(ans) : null;
  const d = res ? DRINKS[res.winner] : null;

  return (
    <div className="min-h-screen w-full px-5 py-8" style={{ background: C.ink, color: C.bone }}>
      <div className="mx-auto max-w-lg">
        <div className="text-center mb-8">
          <div className="text-[10px] tracking-[0.4em] mb-2" style={{ color: C.sage, ...mono }}>HACIENDA LA LABORCILLA</div>
          <h1 className="text-4xl leading-tight" style={{ ...display, color: C.gold }}>Carter Bar</h1>
          <div className="mx-auto mt-3 h-px w-16" style={{ background: C.line }} />
        </div>

        <div style={{ opacity: fade ? 1 : 0, transition: "opacity 300ms ease" }}>
          {!edadOk && <PuertaEdad onPasa={() => setEdadOk(true)} />}

          {edadOk && stage === "intro" && (
            <div className="text-center">
              <p className="text-2xl mb-3" style={{ ...display }}>¿Qué cóctel eres?</p>
              <p className="text-sm mb-8 leading-relaxed" style={{ color: C.sage }}>
                Siete preguntas sobre cómo te gusta beber. Al final, un trago de la carta real
                y la explicación de por qué te tocó ese y no otro. Contesta rápido, sin pensarlo mucho.
              </p>
              <input
                value={name}
                onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && setStage("quiz")}
                placeholder="Tu nombre (opcional)"
                className="w-full mb-4 px-4 py-3 rounded-sm text-center outline-none text-sm"
                style={{ background: C.card, border: `1px solid ${C.line}`, color: C.bone }}
              />
              <button onClick={() => setStage("quiz")} className="px-8 py-3 rounded-sm text-sm tracking-widest"
                style={{ background: C.gold, color: C.ink, ...mono }}>
                EMPEZAR
              </button>
            </div>
          )}

          {edadOk && stage === "quiz" && (
            <div>
              <div className="flex gap-1 mb-6">
                {Q.map((_, i) => (
                  <div key={i} className="h-[2px] flex-1" style={{ background: i <= qi ? C.gold : C.line }} />
                ))}
              </div>
              <p className="text-[10px] tracking-[0.3em] mb-3" style={{ color: C.sage, ...mono }}>
                PREGUNTA {qi + 1} DE {Q.length}
              </p>
              <h2 className="text-2xl mb-6 leading-snug" style={{ ...display }}>{Q[qi].q}</h2>
              <div className="space-y-2">
                {Q[qi].a.map((o, i) => (
                  <button key={i} onClick={() => pick(i)}
                    className="w-full text-left px-4 py-4 rounded-sm text-sm"
                    style={{ background: C.card, border: `1px solid ${ans[qi] === i ? C.gold : C.line}`, color: C.bone }}
                    onMouseEnter={(e) => (e.currentTarget.style.borderColor = C.gold)}
                    onMouseLeave={(e) => (e.currentTarget.style.borderColor = ans[qi] === i ? C.gold : C.line)}>
                    {o.t}
                  </button>
                ))}
              </div>
              {qi > 0 && (
                <button onClick={back} className="mt-6 text-xs tracking-widest" style={{ color: C.sage, ...mono }}>
                  ← ANTERIOR
                </button>
              )}
            </div>
          )}

          {edadOk && stage === "done" && d && (
            <div className="space-y-5">
              <p className="text-center text-[10px] tracking-[0.3em]" style={{ color: C.sage, ...mono }}>
                {name ? `${name.toUpperCase()} · ` : ""}TU CÓCTEL ES
              </p>

              <div className="rounded-lg border p-6 text-center" style={{ borderColor: C.gold, background: C.card }}>
                <div className="text-[10px] tracking-[0.3em] mb-3" style={{ color: C.sage, ...mono }}>{d.tag.toUpperCase()}</div>
                <h2 className="text-4xl mb-2" style={{ ...display, color: C.gold }}>{d.n}</h2>
                <p className="text-sm mb-4" style={{ color: C.bone }}>{d.d}</p>
                <div className="flex justify-center gap-5 text-[11px]" style={{ color: C.sage, ...mono }}>
                  <span>{d.ml} ml</span><span>${d.p}</span><span>ALCOHOL: {d.abv.toUpperCase()}</span>
                </div>
              </div>

              <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
                <h3 className="text-lg mb-2" style={{ ...display, color: C.gold }}>Por qué este trago</h3>
                <p className="text-sm leading-relaxed" style={{ color: C.bone }}>{d.why}</p>
              </div>

              <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
                <h3 className="text-lg mb-3" style={{ ...display, color: C.gold }}>Por qué te tocó a ti</h3>
                <ul className="space-y-3">
                  {res.reasons.map((r, i) => (
                    <li key={i} className="flex gap-3">
                      <span className="text-[10px] pt-1" style={{ color: C.gold, ...mono }}>{r.axis.toUpperCase()}</span>
                      <span className="flex-1 text-sm leading-snug" style={{ color: C.bone }}>
                        Dijiste <span style={{ color: C.sage }}>“{r.label.toLowerCase()}”</span> — {r.read}, y el {d.n} vive justo ahí.
                      </span>
                    </li>
                  ))}
                </ul>
              </div>

              <Comanda ans={ans} name={name} drink={d} />

              <CapturaDatos onEnviar={enviarCorreo} />

              <div className="rounded-lg border p-5" style={{ borderColor: C.line, background: C.card }}>
                <h3 className="text-sm mb-3 tracking-widest" style={{ color: C.sage, ...mono }}>SI ESE NO TE LATE</h3>
                {[res.runnerUp, res.third].map((id) => (
                  <div key={id} className="mb-3 last:mb-0">
                    <div className="text-base" style={{ ...display, color: C.gold }}>{DRINKS[id].n} · ${DRINKS[id].p}</div>
                    <div className="text-xs" style={{ color: C.sage }}>{DRINKS[id].d}</div>
                  </div>
                ))}
              </div>

              <div className="text-center pt-1">
                <button onClick={reset} className="px-6 py-2 rounded-sm text-xs tracking-widest"
                  style={{ border: `1px solid ${C.line}`, color: C.sage, ...mono }}>
                  REPETIR
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
